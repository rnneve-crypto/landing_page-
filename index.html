<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Access Portal</title>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: #fff;
}
.container {
  max-width: 420px;
  margin: 50px auto;
  padding: 25px;
  background: rgba(255,255,255,0.04);
  border-radius: 18px;
  text-align: center;
}
button {
  width: 85%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-size: 15px;
  background: #22c55e;
  color: #fff;
}
</style>
</head>

<body>

<div class="container">
  <h1>Claim Your Reward</h1>
  <input type="email" id="email" placeholder="Enter your email">
  <button onclick="goOffer()">Continue</button>
</div>

<script>
function goOffer() {
  let email = document.getElementById("email").value;
  if(email === "") {
    alert("Enter email");
    return;
  }
  window.location.href = "https://quartzfiles.com/show.php?l=0&u=2509019&id=74375";
}
</script>

</body>
</html>
